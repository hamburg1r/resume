projects:
  - name: Document Processing System
    url: https://github.com/hamburg1r/capston
    affiliation: Personal Project
    startDate: 2025-01-01
    endDate: present
    highlights:
      - Architected a 5-service AWS document processing backend exposing 8 REST
        endpoints across upload, processing, status, and auth workflows, secured
        via Spring Security and AWS Cognito JWT validation.
      - Designed SQS-driven async pipeline decoupling document ingestion from
        background processing, enabling independent horizontal scaling of each stage.
      - Implemented DynamoDB single-table schema tracking 4 document state transitions
        (QUEUED → PROCESSING → COMPLETED / FAILED) with per-document timestamps
        and user association.
      - Eliminated direct server-side file handling by using S3 presigned URLs for
        all upload and preview operations, reducing attack surface and server load.
      # METRIC NEEDED: If you can estimate max concurrent uploads the system was
      # designed to handle, or how many test documents were processed during development,
      # add that here — e.g. "validated against X test documents during integration testing"
      - Achieved ~5–10 second end-to-end processing latency per document across
        file extraction, word count computation, S3 upload, and async SQS/SNS trigger.
 
  - name: NixOS System Configuration & Automation
    url: https://github.com/hamburg1r/nixos
    affiliation: Personal Infrastructure Project
    startDate: 2024-01-01
    endDate: present
    highlights:
      - Reduced fresh developer environment setup from hours to a single command by
        building a fully declarative NixOS configuration with automated LSP servers
        for 8 languages, shell tooling, and editor setup via NixVim.
      - Pinned all 24 system dependencies via Nix Flakes, guaranteeing bit-for-bit
        identical rebuilds across every system generation and eliminating
        environment drift.
      - Configured CI validation via GitHub Actions and binary caching via Cachix,
        ensuring every configuration change is verified buildable before merge.
      - Modularized configuration into reusable host and user layers across 192 Nix
        files, supporting atomic upgrades and instant rollback without manual
        intervention.
      # METRIC NEEDED: If you've ever timed an actual rebuild or rollback, add the
      # duration here — even "sub-60-second rollback" would strengthen this bullet.
 
  - name: Organisation-Centric Project Management System (OCPMS)
    url: null
    affiliation: Personal Project
    startDate: 2024-08-01
    endDate: present
    highlights:
      - Built a full-stack project management platform exposing 16 REST endpoints
        across task, project, and real-time chat workflows, backed by MongoDB and
        a Node.js/Express API.
      - Replaced polling with SSE-based real-time chat, eliminating redundant HTTP
        overhead while persisting full message history in MongoDB.
      - Implemented role-based auth using Passport.js and bcrypt enforcing admin,
        manager, and member permission levels across all 16 API routes.
      - Built Kanban task management with 3-stage lifecycle tracking (Todo → In
        Progress → Done), assignment workflows, and deadline-aware completion
        monitoring.
      # METRIC NEEDED: If you can estimate the number of aggregation pipeline stages
      # or the complexity of the analytics (e.g. "3 aggregation pipelines across
      # X collections"), mention it. Otherwise leave as-is.
      - Developed analytics dashboards visualising task distribution, monthly
        creation trends, and late submission rates using MongoDB aggregation
        pipelines and Chart.js.
 
  - name: NoteQuest
    url: https://github.com/hamburg1r/notequest
    affiliation: Personal Project
    startDate: 2025-01-01
    endDate: present
    highlights:
      - Built an offline-first Flutter productivity app with 100% feature
        availability independent of network state, covering task management,
        markdown note-taking, and calendar scheduling.
      - Designed local persistence architecture using Hive across 4 typed data
        boxes, supporting hierarchical task relationships with subtask and parent
        linkage — no network dependency for any read or write operation.
      - Enforced compile-time state safety using Riverpod and Freezed-generated
        immutable models across 10 providers, eliminating runtime null errors.
      # METRIC NEEDED: If NoteQuest is on the Play Store or has any download count
      # or test users, add that here — even "published to Play Store" is worth stating.
      - Implemented markdown document workflows with multi-type attachment handling
        (images, PDFs, links) across feature-based modules.
 
  - name: SmartQuiz
    url: https://github.com/LXXPK/Quiz-Android-App
    affiliation: Academic Team Project
    startDate: 2023-08-01
    endDate: 2024-01-01
    highlights:
      - Delivered a modular Android quiz app with a 4-member team in under 2 weeks,
        pre-seeded with 150 questions across 30 quizzes and 5 categories.
      - Kept all data operations off the main thread using Kotlin Flow and Coroutines,
        ensuring zero UI jank across 150-question datasets and 600 stored answer options.
      - Built Room-based persistence for quiz history, user interests, and performance
        tracking with structured indexed queries.
      # METRIC NEEDED: Was this graded or presented? If it received a score or was
      # demoed to faculty/industry judges, mention the outcome.
      - Built navigation routing and dashboard UI using Jetpack Compose and Hilt DI,
        wiring real-time Firebase data into a modular MVVM architecture.
