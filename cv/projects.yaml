  - name: SmartQuiz
    url: https://github.com/LXXPK/Quiz-Android-App
    affiliation: Academic Team Project
    startDate: 2023-08-01
    endDate: 2024-01-01
    highlights:
      # METRIC NEEDED: Outcome of presentation/grading (score, faculty recognition, etc.).
      - Delivered modular Android quiz app with 4-member team in under 2 weeks, pre-loaded with 150
        questions across 30 quizzes and 5 categories.
      - Kept all data ops off the main thread with Kotlin Flow and Coroutines, ensuring zero UI jank
