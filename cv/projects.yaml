  - name: Document Processing System
    url: https://github.com/hamburg1r/capston
    affiliation: Personal Project
    startDate: 2025-01-01
    endDate: present
    highlights:
      - Architected a cloud-native document processing backend across 5 AWS services (S3, SQS, SNS, DynamoDB, Cognito) with 8 secured REST endpoints using Spring Security and Cognito JWT validation.
      - Eliminated server-side file handling entirely via S3 presigned URLs for all uploads and previews, reducing attack surface and server load.
      - Designed a single-table DynamoDB schema tracking 4 document states (QUEUED → PROCESSING → COMPLETED/FAILED) with per-document timestamps and user association.
      # METRIC NEEDED: Max concurrent uploads handled or number of test documents validated during integration testing.
