projects:
  - name: Document Processing System
    url: https://hamburg1r/capston
    affiliation: Personal Project
    startDate: 2025-01-01
    endDate: present
    highlights:
      - Built a 5-service AWS-integrated document processing platform with a
        4-member team, delivering across 31 Java source files in under 2 weeks.
      - Exposed 8 REST endpoints covering document upload, processing, status,
        and authentication workflows, secured via Spring Security and AWS Cognito
        JWT validation.
      - Designed SQS-driven async pipeline decoupling document upload from
        background processing, enabling independent scaling of each stage.
      - Implemented secure file upload and preview using S3 presigned URLs,
        eliminating direct server-side file handling.
      - Designed DynamoDB single-table schema tracking 4 document state
        transitions (QUEUED → PROCESSING → COMPLETED / FAILED) with timestamps
        and user association per document.
      - Achieved ~5–10 second end-to-end processing time per document covering
        file size extraction, word count, S3 upload, and async SQS/SNS pipeline
        trigger.

  - name: NixOS System Configuration & Automation
    url: https://github.com/hamburg1r/nixos
    affiliation: Personal Infrastructure Project
    startDate: 2024-01-01
    endDate: present
    highlights:
      - Manages a fully declarative NixOS system across 192 Nix files spanning
        modularized host, user, and package layers, enabling reproducible
        provisioning from a single command.
      - Eliminated environment inconsistency across machines by declaratively
        pinning all 24 system dependencies via Nix Flakes, guaranteeing
        identical rebuilds across any system generation.
      - Automated complete developer environment setup including LSP servers for
        8 languages, shell tooling, and editor configuration via NixVim,
        reducing fresh system setup from hours to a single command.
      - Configured CI validation via GitHub Actions and binary caching via
        Cachix, ensuring every configuration change is buildable before merge.
      - Modularized configuration into reusable host and user layers, supporting
        atomic upgrades and instant rollback across 191 commits of iterative
        delivery.

  - name: Organisation-Centric Project Management System (OCPMS)
    url: null
    affiliation: Personal Project
    startDate: 2024-08-01
    endDate: present
    highlights:
      - Built a full-stack project management platform across 26 JavaScript
        source files exposing 16 REST endpoints for task, project, and
        real-time chat workflows.
      - Replaced polling with SSE-based real-time chat, cutting unnecessary HTTP
        overhead while persisting full message history in MongoDB.
      - Implemented role-based auth using Passport.js and bcrypt across all 16
        API routes with admin, manager, and member permission levels.
      - Built Kanban task management with 3-stage lifecycle tracking (Todo →
        In Progress → Done), assignment workflows, and deadline-aware completion
        monitoring.
      - Developed analytics dashboards visualising task distribution, monthly
        creation trends, and late submission rates using MongoDB aggregation
        pipelines and Chart.js.

  - name: NoteQuest
    url: https://hamburg1r/notequest
    affiliation: Personal Project
    startDate: 2025-01-01
    endDate: present
    highlights:
      - Built an offline-first Flutter productivity app across 18 Dart source
        files covering task management, markdown note-taking, and calendar
        scheduling with 100% feature availability independent of network state.
      - Implemented reactive state management using Riverpod across 10
        providers with Freezed-generated immutable models, enforcing
        compile-time state safety and eliminating runtime null errors.
      - Designed local persistence architecture using Hive across 4 data boxes
        (todos, markdowns, mainScreenTodos, documents), supporting hierarchical
        task relationships with subtask and parent linkage.
      - Implemented markdown-based document workflows with multi-type attachment
        handling (images, PDFs, links) and structured content management across
        feature-based modules.

  - name: SmartQuiz
    url: https://github.com/LXXPK/Quiz-Android-App
    affiliation: Academic Team Project
    startDate: 2023-08-01
    endDate: 2024-01-01
    highlights:
      - Delivered a modular Android quiz application with a 4-member team in
        under 2 weeks, pre-seeded with 150 questions across 30 quizzes,
        5 categories, and 600 answer options.
      - Built dashboard UI widgets and navigation routing using Jetpack Compose
        and Hilt DI, integrating real-time Firebase data into a modular MVVM
        architecture.
      - Implemented reactive state management using Kotlin Flow and Coroutines,
        keeping all 150-question data operations off the main thread.
      - Built Room-based persistence layer for quiz history, user interests, and
        performance tracking with structured indexed queries across 600 stored
        answer options.
