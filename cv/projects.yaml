projects:
  - name: LedgerFlow
    url: null
    affiliation: Personal Project (In Progress)
    startDate: 2026-05-09
    endDate: present
    highlights:
      - Designing a double-entry ledger platform with transaction orchestration, account management, and audit trails, ensuring every monetary movement remains balanced and traceable.
      - Implemented idempotent transaction processing and state-driven workflows (CREATED → PROCESSING → SUCCESS/FAILED → REVERSED) to prevent duplicate execution under retries and network failures.
