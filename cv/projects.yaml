projects:
  - name: Document Processing System
    url: https://github.com/hamburg1r/capston
    affiliation: Personal Project
    startDate: 2025-01-01
    endDate: present
    highlights:
      - Architected 5 AWS services (S3, SQS, SNS, DynamoDB, Cognito) behind 8 REST endpoints secured
        with Spring Security and Cognito JWT validation.
      - Built a single-table DynamoDB schema tracking 4 document states (QUEUED → PROCESSING →
        COMPLETED/FAILED) with per-document timestamps and user association.
      - Eliminated server-side file handling by using S3 presigned URLs for all uploads/previews,
        reducing attack surface and server load.
      # METRIC NEEDED: Max concurrent uploads handled or number of test documents validated during
      # integration testing.
      - Achieved 5–10s end-to-end processing latency per document, covering extraction, word count,
        S3 upload, and async SQS/SNS trigger.

  - name: NixOS System Configuration & Automation
    url: https://github.com/hamburg1r/nixos
    affiliation: Personal Infrastructure Project
    startDate: 2024-01-01
    endDate: present
    highlights:
      - Cut developer environment setup from hours to one command with a declarative NixOS config
        (automated LSP, shell tooling, editor via NixVim for 8 languages).
      - Pinned 24 dependencies with Nix Flakes for bit-for-bit reproducible rebuilds, eliminating
        environment drift.
      - Enforced CI validation (GitHub Actions) and binary caching (Cachix) so every config change
        is verified buildable before merge.
      - Modularized configuration into reusable host/user layers (192 files), enabling atomic upgrades
        and instant rollback with no manual steps.
      # METRIC NEEDED: Actual rebuild or rollback time (e.g., “sub-60-second rollback”).

