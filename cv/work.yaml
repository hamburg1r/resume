work:
  - organization: Encora
    url: https://www.encora.com
    location: New Delhi, India
    positions:
      - position: Software Engineer Trainee
        startDate: 2025-08-04
        endDate: 2026-04-23
        highlights:
          # METRIC NEEDED: If you can confirm this reached a staging/demo environment
          # or was reviewed by senior engineers, mention that ("delivered to internal review",
          # "demo-ready in production-equivalent environment", etc.)
          - Owned backend architecture for a cloud-native document processing platform
            integrating 5 AWS services (S3, SQS, SNS, DynamoDB, Cognito), shipping a
            demo-ready system with a 4-member team in under 2 weeks.
          - Designed SQS-driven async pipeline fully decoupling document upload from
            background processing, achieving ~5–10 second end-to-end document handling
            covering file extraction, word count, S3 upload, and SNS event trigger.
          - Secured 8 REST endpoints with JWT-based auth via Spring Security and AWS
            Cognito, enforcing role-based access across all upload, processing, and
            status workflows.
          # METRIC NEEDED: How many screens or flows did you own in the Android app?
          # If you built the majority of the UI, say "owned X of Y screens"
          - Built navigation routing and dashboard UI for an Android quiz app using
            Jetpack Compose and Hilt DI, wiring real-time Firebase data into a
            modular MVVM architecture across a 4-member team.

